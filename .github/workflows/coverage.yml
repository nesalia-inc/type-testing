name: Coverage Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          OUTPUT=$(pnpm turbo test -- --coverage 2>&1)
          echo "$OUTPUT"
          COVERAGE=$(echo "$OUTPUT" | grep "All files" | awk '{print $5}')
          echo "Coverage: $COVERAGE%"
          if [ "$COVERAGE" != "100" ]; then
            echo "Error: Coverage is $COVERAGE%, expected 100%"
            exit 1
          fi
